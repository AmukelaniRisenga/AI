[build]
  command = "npm run build"
  publish = "dist/spa"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/api/analyze-object"
  to = "/.netlify/functions/analyze-object"
  status = 200

[[redirects]]
  from = "/api/interpret-command"
  to = "/.netlify/functions/interpret-command"
  status = 200

[[redirects]]
  from = "/api/env-debug"
  to = "/.netlify/functions/env-debug"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
